services:
  - type: web
    name: abstrabit
    runtime: python
    plan: free
    buildCommand: >-
      curl -LsSf https://astral.sh/uv/install.sh | sh &&
      export PATH="$HOME/.local/bin:$PATH" &&
      cd backend && uv sync --frozen --no-dev &&
      cd ../frontend && npm ci && npm run build &&
      mkdir -p ../backend/static && cp -r dist/* ../backend/static/
    startCommand: cd backend && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DISCORD_APPLICATION_ID
        sync: false
      - key: DISCORD_PUBLIC_KEY
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_URL
        sync: false
